<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情報アラートまとめ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👔</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, runTransaction, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  const firebaseConfig = {
    apiKey:            "AIzaSyBxpnH1EVG4NPKwF6RYEONlKLDnm-psRu8",
    authDomain:        "study-tools-link.firebaseapp.com",
    databaseURL:       "https://study-tools-link-default-rtdb.firebaseio.com",
    projectId:         "study-tools-link",
    storageBucket:     "study-tools-link.firebasestorage.app",
    messagingSenderId: "465773166187",
    appId:             "1:465773166187:web:fcebf789e057a3be267b2e",
    measurementId:     "G-6346MW19K8",
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window._firebaseReady = true;
  window._db = db;
  window._ref = ref;
  window._runTransaction = runTransaction;
  window._onValue = onValue;
  if (window._onFirebaseReady) window._onFirebaseReady();
</script>

<style>
:root {
  --bg: #f5f5f3;
  --surface: #ffffff;
  --border: #e4e4df;
  --border-hover: #b8b8b0;
  --accent: #1a56db;
  --accent-light: #eff4ff;
  --text: #111111;
  --muted: #6b6b6b;
  --tag-bg: #f0fdf4;
  --tag-text: #166534;
  --tag-border: #bbf7d0;
  --like-color: #dc2626;
  --like-bg: #fff1f2;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.09);
  --r: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:14px; line-height:1.6; -webkit-font-smoothing:antialiased; }

header { background:var(--surface); border-bottom:1px solid var(--border); height:54px; padding:0 32px; display:flex; align-items:center; gap:18px; position:sticky; top:0; z-index:100; }
.brand { display:flex; align-items:center; gap:8px; font-family:'DM Mono',monospace; font-size:12px; font-weight:500; letter-spacing:.06em; white-space:nowrap; }
.live-dot { width:7px; height:7px; border-radius:50%; background:#22c55e; animation:blink 2.4s ease-in-out infinite; flex-shrink:0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.hdiv { width:1px; height:18px; background:var(--border); }
.hupdated { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
.hsearch { margin-left:auto; position:relative; display:flex; align-items:center; }
.hsearch svg { position:absolute; left:9px; color:var(--muted); pointer-events:none; }
.search-input { padding:6px 12px 6px 30px; border:1px solid var(--border); border-radius:var(--r); background:var(--bg); font-size:13px; font-family:'Noto Sans JP',sans-serif; color:var(--text); width:220px; outline:none; transition:border-color .15s, box-shadow .15s; }
.search-input::placeholder { color:#bbb; }
.search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(26,86,219,.1); }

.main { max-width:920px; margin:0 auto; padding:28px 32px 60px; }

.controls { display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
.ctrl-label { font-size:12px; color:var(--muted); font-weight:500; white-space:nowrap; }
.sel-wrap { position:relative; display:inline-flex; align-items:center; }
.kw-select { appearance:none; padding:6px 28px 6px 12px; border:1px solid var(--border); border-radius:var(--r); background:var(--surface); font-size:13px; font-family:'Noto Sans JP',sans-serif; color:var(--text); cursor:pointer; outline:none; transition:border-color .15s; min-width:200px; }
.kw-select:hover,.kw-select:focus { border-color:var(--accent); }
.chevron { position:absolute; right:8px; pointer-events:none; color:var(--muted); }
.sort-group { display:flex; border:1px solid var(--border); border-radius:var(--r); overflow:hidden; background:var(--surface); }
.sort-btn { padding:6px 14px; font-size:12px; font-family:'Noto Sans JP',sans-serif; border:none; background:none; color:var(--muted); cursor:pointer; border-right:1px solid var(--border); transition:background .12s, color .12s; white-space:nowrap; }
.sort-btn:last-child { border-right:none; }
.sort-btn.active { background:var(--accent-light); color:var(--accent); font-weight:500; }
.count-badge { margin-left:auto; font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:3px 10px; }

#alerts-container { display:flex; flex-direction:column; gap:8px; }
.alert-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px 20px; display:grid; grid-template-columns:1fr 64px; gap:16px; align-items:start; box-shadow:var(--shadow-sm); transition:border-color .15s, box-shadow .15s; opacity:0; transform:translateY(5px); animation:cardIn .22s ease forwards; }
@keyframes cardIn { to{opacity:1;transform:translateY(0)} }
.alert-card:hover { border-color:var(--border-hover); box-shadow:var(--shadow-md); }
.card-meta { display:flex; align-items:center; gap:8px; margin-bottom:7px; flex-wrap:wrap; }
.kw-tag { font-size:11px; font-weight:500; padding:2px 8px; border-radius:4px; background:var(--tag-bg); color:var(--tag-text); border:1px solid var(--tag-border); white-space:nowrap; }
.card-date { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
.card-src { font-size:11px; color:var(--muted); display:flex; align-items:center; gap:5px; }
.card-src::before { content:''; display:inline-block; width:3px; height:3px; border-radius:50%; background:var(--border-hover); }
.card-title { font-size:14px; font-weight:500; line-height:1.55; margin-bottom:6px; letter-spacing:-.01em; }
.card-title a { color:var(--text); text-decoration:none; }
.card-title a:hover { color:var(--accent); text-decoration:underline; text-underline-offset:3px; }
.card-snippet { font-size:12px; color:var(--muted); line-height:1.75; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

.like-wrap { display:flex; justify-content:center; padding-top:2px; }
.like-btn { display:flex; flex-direction:column; align-items:center; gap:3px; width:56px; padding:9px 6px; border:1px solid var(--border); border-radius:var(--r); background:var(--surface); cursor:pointer; transition:all .15s; color:var(--muted); user-select:none; }
.like-btn:hover { border-color:var(--like-color); color:var(--like-color); background:var(--like-bg); }
.like-btn.liked { border-color:var(--like-color); background:var(--like-bg); color:var(--like-color); }
.like-icon { font-size:18px; line-height:1; transition:transform .15s; }
.like-btn:hover .like-icon { transform:scale(1.2); }
.like-btn.liked .like-icon { transform:scale(1.1); }
.like-count { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; line-height:1; }
.like-label { font-size:9px; letter-spacing:.06em; font-weight:500; opacity:.7; }

.state-msg { text-align:center; padding:72px 0; color:var(--muted); }
.state-msg .icon { font-size:30px; margin-bottom:10px; }

@media(max-width:600px) {
  header { padding:0 16px; }
  .main { padding:20px 16px 40px; }
  .alert-card { grid-template-columns:1fr; }
  .like-wrap { justify-content:flex-start; }
  .like-btn { flex-direction:row; width:auto; padding:6px 12px; gap:8px; }
  .like-label { display:none; }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="live-dot"></div>
    情報アラートまとめ
  </div>
  <div class="hdiv"></div>
  <div class="hupdated" id="last-updated">読み込み中...</div>
  <div class="hsearch">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" type="text" id="search-input" placeholder="記事を検索...">
  </div>
</header>

<main class="main">
  <div class="controls">
    <span class="ctrl-label">キーワード</span>
    <div class="sel-wrap">
      <select class="kw-select" id="kw-select">
        <option value="ALL">すべてのキーワード</option>
      </select>
      <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
    </div>
    <div class="sort-group">
      <button class="sort-btn active" data-sort="date" onclick="setSort(this)">新着順</button>
      <button class="sort-btn" data-sort="likes" onclick="setSort(this)">❤️ 注目順</button>
    </div>
    <span class="count-badge" id="count-badge">— 件</span>
  </div>
  <div id="alerts-container">
    <div class="state-msg"><div class="icon">⏳</div><p>データを読み込み中...</p></div>
  </div>
</main>

<script>
const DATA_URL = 'https://yokosugi.github.io/sales-topic/alerts-data.json';

let allAlerts = [], likeCounts = {}, sortMode = 'date', searchQuery = '', activeKeyword = 'ALL';
let likedSet = new Set(JSON.parse(localStorage.getItem('alert_liked') || '[]'));
let firebaseReady = false;

function onFirebaseReady() {
  firebaseReady = true;
  window._onValue(window._ref(window._db, 'likes'), snap => {
    likeCounts = snap.val() || {};
    renderAlerts();
  });
}

if (window._firebaseReady) onFirebaseReady();
else window._onFirebaseReady = onFirebaseReady;

async function loadAlerts() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    const data = await res.json();
    allAlerts = (data.alerts || []).map(a => ({ ...a, id: makeId(a) }));
    document.getElementById('last-updated').textContent = '最終更新: ' + (data.lastUpdated || '不明');
    buildSelect();
    renderAlerts();
  } catch(e) {
    document.getElementById('alerts-container').innerHTML =
      '<div class="state-msg"><div class="icon">⚠️</div><p>データの読み込みに失敗しました</p></div>';
  }
}

function makeId(a) {
  try { return btoa(encodeURIComponent(a.url||'')).replace(/[^a-zA-Z0-9]/g,'').slice(0,40); } catch(e) { return Math.random().toString(36).slice(2); }
}

function buildSelect() {
  const sel = document.getElementById('kw-select');
  [...new Set(allAlerts.map(a=>a.keyword).filter(Boolean))].forEach(kw => {
    const o = document.createElement('option'); o.value = kw; o.textContent = kw; sel.appendChild(o);
  });
  sel.addEventListener('change', e => { activeKeyword = e.target.value; renderAlerts(); });
}

function setSort(btn) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); sortMode = btn.dataset.sort; renderAlerts();
}

function renderAlerts() {
  let list = allAlerts.filter(a => {
    const kwOk = activeKeyword === 'ALL' || a.keyword === activeKeyword;
    const q = searchQuery.toLowerCase();
    const txOk = !q || (a.title||'').toLowerCase().includes(q) || (a.snippet||'').toLowerCase().includes(q) || (a.source||'').toLowerCase().includes(q);
    return kwOk && txOk;
  });
  if (sortMode === 'likes') list = [...list].sort((a,b) => (likeCounts[b.id]||0)-(likeCounts[a.id]||0));

  document.getElementById('count-badge').textContent = list.length + ' 件';
  const c = document.getElementById('alerts-container');
  if (!list.length) { c.innerHTML = '<div class="state-msg"><div class="icon">📭</div><p>該当する記事がありません</p></div>'; return; }

  c.innerHTML = list.map((a, i) => {
    const count = likeCounts[a.id] || 0, liked = likedSet.has(a.id);
    return `<div class="alert-card" style="animation-delay:${Math.min(i,15)*.025}s">
      <div>
        <div class="card-meta">
          <span class="kw-tag">${a.keyword||''}</span>
          <span class="card-date">${a.date||''}</span>
          ${a.source ? `<span class="card-src">${a.source}</span>` : ''}
        </div>
        <div class="card-title"><a href="${a.url||'#'}" target="_blank" rel="noopener">${a.title||'（タイトルなし）'}</a></div>
        ${a.snippet ? `<div class="card-snippet">${a.snippet}</div>` : ''}
      </div>
      <div class="like-wrap">
        <button class="like-btn ${liked?'liked':''}" onclick="toggleLike('${a.id}',this)" title="注目する">
          <span class="like-icon">${liked?'❤️':'🤍'}</span>
          <span class="like-count" id="lc-${a.id}">${count}</span>
          <span class="like-label">注目</span>
        </button>
      </div>
    </div>`;
  }).join('');
}

function toggleLike(id, btn) {
  if (!firebaseReady) { alert('Firebaseが未設定です。'); return; }
  const already = likedSet.has(id);
  window._runTransaction(window._ref(window._db, 'likes/'+id), cur => Math.max(0,(cur||0)+(already?-1:1)));
  already ? likedSet.delete(id) : likedSet.add(id);
  localStorage.setItem('alert_liked', JSON.stringify([...likedSet]));
  btn.classList.toggle('liked', !already);
  btn.querySelector('.like-icon').textContent = already ? '🤍' : '❤️';
  const countEl = document.getElementById('lc-' + id);
  if (countEl) countEl.textContent = Math.max(0, (likeCounts[id]||0) + (already ? -1 : 1));
}

document.getElementById('search-input').addEventListener('input', e => { searchQuery = e.target.value; renderAlerts(); });

loadAlerts();
</script>
</body>
</html>
