<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情報アラートまとめ</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👔</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f3;
  --surface: #ffffff;
  --border: #e4e4df;
  --border-hover: #b8b8b0;
  --accent: #1a56db;
  --text: #111111;
  --muted: #6b6b6b;
  --tag-bg: #f0fdf4;
  --tag-text: #166534;
  --tag-border: #bbf7d0;
  --pin-color: #d97706;
  --pin-bg: #fffbeb;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.09);
  --r: 8px;
  --panel-w: 420px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:14px; line-height:1.6; -webkit-font-smoothing:antialiased; overflow-x:hidden; }

header { background:var(--surface); border-bottom:1px solid var(--border); height:54px; padding:0 32px; display:flex; align-items:center; gap:18px; position:sticky; top:0; z-index:200; }
.brand { display:flex; align-items:center; gap:8px; font-family:'DM Mono',monospace; font-size:12px; font-weight:500; letter-spacing:.06em; white-space:nowrap; }
.live-dot { width:7px; height:7px; border-radius:50%; background:#22c55e; animation:blink 2.4s ease-in-out infinite; flex-shrink:0; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
.hdiv { width:1px; height:18px; background:var(--border); }
.hupdated { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
.hsearch { margin-left:auto; position:relative; display:flex; align-items:center; }
.hsearch svg { position:absolute; left:9px; color:var(--muted); pointer-events:none; }
.search-input { padding:6px 12px 6px 30px; border:1px solid var(--border); border-radius:var(--r); background:var(--bg); font-size:13px; font-family:'Noto Sans JP',sans-serif; color:var(--text); width:220px; outline:none; transition:border-color .15s, box-shadow .15s; }
.search-input::placeholder { color:#bbb; }
.search-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(26,86,219,.1); }

.layout { max-width:1100px; margin:0 auto; padding:28px 32px 60px; display:grid; grid-template-columns:1fr 260px; gap:24px; align-items:start; transition:margin-right .3s ease; }
.layout.panel-open { margin-right:var(--panel-w); }

.controls { display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
.ctrl-label { font-size:12px; color:var(--muted); font-weight:500; white-space:nowrap; }
.sel-wrap { position:relative; display:inline-flex; align-items:center; }
.kw-select { appearance:none; padding:6px 28px 6px 12px; border:1px solid var(--border); border-radius:var(--r); background:var(--surface); font-size:13px; font-family:'Noto Sans JP',sans-serif; color:var(--text); cursor:pointer; outline:none; transition:border-color .15s; min-width:180px; }
.kw-select:hover,.kw-select:focus { border-color:var(--accent); }
.chevron { position:absolute; right:8px; pointer-events:none; color:var(--muted); }
.count-badge { margin-left:auto; font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:3px 10px; }

#alerts-container { display:flex; flex-direction:column; gap:8px; }
.alert-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:16px 18px; display:grid; grid-template-columns:1fr 48px; gap:12px; align-items:start; box-shadow:var(--shadow-sm); transition:border-color .15s, box-shadow .15s; }
.alert-card:hover { border-color:var(--border-hover); box-shadow:var(--shadow-md); }
.alert-card.active { border-color:var(--accent); box-shadow:0 0 0 2px rgba(26,86,219,.12); }
.card-meta { display:flex; align-items:center; gap:8px; margin-bottom:6px; flex-wrap:wrap; }
.kw-tag { font-size:11px; font-weight:500; padding:2px 8px; border-radius:4px; background:var(--tag-bg); color:var(--tag-text); border:1px solid var(--tag-border); white-space:nowrap; }
.card-date { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
.card-src { font-size:11px; color:var(--muted); }
.card-title { font-size:14px; font-weight:500; line-height:1.55; margin-bottom:5px; letter-spacing:-.01em; cursor:pointer; color:var(--text); }
.card-title:hover { color:var(--accent); text-decoration:underline; text-underline-offset:3px; }
.card-snippet { font-size:12px; color:var(--muted); line-height:1.75; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

.pin-wrap { display:flex; justify-content:center; padding-top:2px; }
.pin-btn { display:flex; flex-direction:column; align-items:center; gap:2px; width:44px; padding:7px 4px; border:1px solid var(--border); border-radius:var(--r); background:var(--surface); cursor:pointer; transition:all .15s; user-select:none; }
.pin-btn:hover { border-color:var(--pin-color); background:var(--pin-bg); }
.pin-btn.pinned { border-color:var(--pin-color); background:var(--pin-bg); }
.pin-icon { font-size:16px; line-height:1; }
.pin-label { font-size:9px; font-weight:500; color:var(--muted); }
.pin-btn.pinned .pin-label { color:var(--pin-color); }

/* クリップサイドバー */
.sidebar { position:sticky; top:78px; }
.clip-panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); box-shadow:var(--shadow-sm); overflow:hidden; }
.clip-header { padding:13px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
.clip-header-title { font-size:13px; font-weight:700; }
.clip-count { margin-left:auto; font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
.clip-list { list-style:none; max-height:75vh; overflow-y:auto; }
.clip-item { display:flex; align-items:flex-start; gap:8px; padding:10px 14px; border-bottom:1px solid var(--border); transition:background .12s; cursor:pointer; }
.clip-item:last-child { border-bottom:none; }
.clip-item:hover { background:var(--bg); }
.clip-body { flex:1; min-width:0; }
.clip-title-text { font-size:12px; font-weight:500; line-height:1.4; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; color:var(--text); }
.clip-item:hover .clip-title-text { color:var(--accent); }
.clip-meta { display:flex; gap:6px; margin-top:3px; }
.clip-kw { font-size:10px; color:var(--muted); }
.clip-empty { padding:24px 16px; text-align:center; color:var(--muted); font-size:12px; }

/* スライドインパネル */
.slide-panel { position:fixed; top:0; right:0; width:var(--panel-w); height:100vh; background:var(--surface); border-left:1px solid var(--border); box-shadow:-4px 0 24px rgba(0,0,0,0.1); z-index:300; display:flex; flex-direction:column; transform:translateX(100%); transition:transform .3s ease; }
.slide-panel.open { transform:translateX(0); }
.sp-header { padding:16px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
.sp-close { width:32px; height:32px; border:1px solid var(--border); border-radius:6px; background:var(--bg); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:background .12s; flex-shrink:0; }
.sp-close:hover { background:var(--border); }
.sp-actions { display:flex; align-items:center; gap:8px; margin-left:auto; }
.sp-pin-btn { display:flex; align-items:center; gap:5px; padding:6px 12px; border:1px solid var(--border); border-radius:6px; background:var(--surface); cursor:pointer; font-size:12px; font-family:'Noto Sans JP',sans-serif; transition:all .15s; }
.sp-pin-btn:hover { border-color:var(--pin-color); background:var(--pin-bg); }
.sp-pin-btn.pinned { border-color:var(--pin-color); background:var(--pin-bg); color:var(--pin-color); }
.sp-link-btn { display:flex; align-items:center; gap:5px; padding:6px 12px; border:1px solid var(--border); border-radius:6px; background:var(--surface); cursor:pointer; font-size:12px; color:var(--text); text-decoration:none; transition:all .15s; }
.sp-link-btn:hover { border-color:var(--accent); color:var(--accent); }
.sp-body { flex:1; overflow-y:auto; padding:20px 20px 32px; }
.sp-kw-tag { font-size:11px; font-weight:500; padding:2px 8px; border-radius:4px; background:var(--tag-bg); color:var(--tag-text); border:1px solid var(--tag-border); display:inline-block; margin-bottom:10px; }
.sp-date { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); margin-left:8px; }
.sp-title { font-size:17px; font-weight:700; line-height:1.5; margin-bottom:6px; letter-spacing:-.02em; }
.sp-source { font-size:12px; color:var(--muted); margin-bottom:18px; }
.sp-divider { border:none; border-top:1px solid var(--border); margin:18px 0; }
.sp-summary-box { background:var(--bg); border:1px solid var(--border); border-radius:var(--r); padding:16px; }
.sp-summary-label { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:.08em; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
.sp-summary-text { font-size:13px; line-height:1.85; color:var(--text); white-space:pre-wrap; }
.sp-summary-text.loading { color:var(--muted); font-style:italic; }
.sp-summarize-btn { margin-top:18px; width:100%; padding:10px; border:1px solid var(--accent); border-radius:var(--r); background:var(--accent-light,#eff4ff); color:var(--accent); font-size:13px; font-family:'Noto Sans JP',sans-serif; font-weight:500; cursor:pointer; transition:all .15s; }
.sp-summarize-btn:hover { background:var(--accent); color:#fff; }
.sp-summarize-btn:disabled { opacity:.5; cursor:not-allowed; }

.state-msg { text-align:center; padding:72px 0; color:var(--muted); }
.state-msg .icon { font-size:30px; margin-bottom:10px; }

@media(max-width:860px) {
  .layout { grid-template-columns:1fr; padding:16px; }
  .layout.panel-open { margin-right:0; }
  .sidebar { position:static; }
  header { padding:0 16px; }
  .alert-card { grid-template-columns:1fr; }
  .pin-wrap { justify-content:flex-start; }
  .slide-panel { width:100vw; }
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="live-dot"></div>
    情報アラートまとめ
  </div>
  <div class="hdiv"></div>
  <div class="hupdated" id="last-updated">読み込み中...</div>
  <div class="hsearch">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" type="text" id="search-input" placeholder="記事を検索...">
  </div>
</header>

<!-- スライドインパネル -->
<div class="slide-panel" id="slide-panel">
  <div class="sp-header">
    <button class="sp-close" id="sp-close" title="閉じる">✕</button>
    <div class="sp-actions">
      <button class="sp-pin-btn" id="sp-pin-btn">📍 クリップ</button>
      <a class="sp-link-btn" id="sp-link-btn" href="#" target="_blank" rel="noopener">↗ 元記事</a>
    </div>
  </div>
  <div class="sp-body" id="sp-body">
    <!-- JS で描画 -->
  </div>
</div>

<div class="layout" id="layout">
  <div class="main-col">
    <div class="controls">
      <span class="ctrl-label">キーワード</span>
      <div class="sel-wrap">
        <select class="kw-select" id="kw-select">
          <option value="ALL">すべてのキーワード</option>
        </select>
        <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <span class="count-badge" id="count-badge">— 件</span>
    </div>
    <div id="alerts-container">
      <div class="state-msg"><div class="icon">⏳</div><p>データを読み込み中...</p></div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="clip-panel">
      <div class="clip-header">
        <span>📌</span>
        <span class="clip-header-title">クリップした記事</span>
        <span class="clip-count" id="clip-count"></span>
      </div>
      <ul class="clip-list" id="clip-list">
        <li class="clip-empty">クリップされた記事はありません</li>
      </ul>
    </div>
  </aside>
</div>

<script>
const DATA_URL = 'https://yokosugi.github.io/sales-topic/alerts-data.json';
const LS_KEY   = 'sales_clips_v1';
const LS_SUM   = 'sales_summaries_v1';

let allAlerts     = [];
let searchQuery   = '';
let activeKeyword = 'ALL';
let currentAlert  = null;

function loadClips()   { try { return JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e) { return {}; } }
function saveClips(c)  { localStorage.setItem(LS_KEY, JSON.stringify(c)); }
function loadSummaries(){ try { return JSON.parse(localStorage.getItem(LS_SUM) || '{}'); } catch(e) { return {}; } }
function saveSummaries(s){ localStorage.setItem(LS_SUM, JSON.stringify(s)); }

function makeId(url) {
  let h = 2166136261;
  for (let i = 0; i < url.length; i++) { h ^= url.charCodeAt(i); h = (h * 16777619) >>> 0; }
  return 'c' + h.toString(16).padStart(8, '0');
}

/* ── データ読み込み ── */
async function loadAlerts() {
  try {
    const res  = await fetch(DATA_URL + '?t=' + Date.now());
    const data = await res.json();
    allAlerts  = (data.alerts || []).map(a => ({ ...a, id: makeId(a.url || '') }));
    document.getElementById('last-updated').textContent = '最終更新: ' + (data.lastUpdated || '不明');
    buildSelect();
    renderAlerts();
    renderClips();
  } catch(e) {
    document.getElementById('alerts-container').innerHTML =
      '<div class="state-msg"><div class="icon">⚠️</div><p>データの読み込みに失敗しました</p></div>';
  }
}

function buildSelect() {
  const sel = document.getElementById('kw-select');
  [...new Set(allAlerts.map(a => a.keyword).filter(Boolean))].forEach(kw => {
    const o = document.createElement('option'); o.value = kw; o.textContent = kw; sel.appendChild(o);
  });
  sel.addEventListener('change', e => { activeKeyword = e.target.value; renderAlerts(); });
}

/* ── カード描画 ── */
function renderAlerts() {
  const clips = loadClips();
  const list  = allAlerts.filter(a => {
    const kwOk = activeKeyword === 'ALL' || a.keyword === activeKeyword;
    const q    = searchQuery.toLowerCase();
    const txOk = !q || (a.title||'').toLowerCase().includes(q) || (a.snippet||'').toLowerCase().includes(q) || (a.source||'').toLowerCase().includes(q);
    return kwOk && txOk;
  });
  document.getElementById('count-badge').textContent = list.length + ' 件';
  const c = document.getElementById('alerts-container');
  if (!list.length) { c.innerHTML = '<div class="state-msg"><div class="icon">📭</div><p>該当する記事がありません</p></div>'; return; }

  c.innerHTML = '';
  list.forEach((a, i) => {
    const pinned = !!clips[a.id];
    const card   = document.createElement('div');
    card.className = 'alert-card' + (currentAlert?.id === a.id ? ' active' : '');
    card.dataset.id = a.id;

    // 左カラム
    const left = document.createElement('div');
    const meta = document.createElement('div'); meta.className = 'card-meta';
    if (a.keyword) { const t = document.createElement('span'); t.className = 'kw-tag'; t.textContent = a.keyword; meta.appendChild(t); }
    if (a.date)    { const d = document.createElement('span'); d.className = 'card-date'; d.textContent = a.date; meta.appendChild(d); }
    if (a.source)  { const s = document.createElement('span'); s.className = 'card-src'; s.textContent = a.source; meta.appendChild(s); }
    left.appendChild(meta);

    const titleEl = document.createElement('div'); titleEl.className = 'card-title'; titleEl.textContent = a.title || '（タイトルなし）';
    titleEl.addEventListener('click', () => openPanel(a));
    left.appendChild(titleEl);

    if (a.snippet) { const sn = document.createElement('div'); sn.className = 'card-snippet'; sn.textContent = a.snippet; left.appendChild(sn); }

    // ピンボタン
    const pinWrap = document.createElement('div'); pinWrap.className = 'pin-wrap';
    const btn = document.createElement('button');
    btn.className = 'pin-btn' + (pinned ? ' pinned' : '');
    btn.title = 'クリップ';
    btn.innerHTML = `<span class="pin-icon">${pinned ? '📌' : '📍'}</span><span class="pin-label">${pinned ? '済' : 'クリップ'}</span>`;
    btn.addEventListener('click', e => { e.stopPropagation(); togglePin(a, btn); });
    pinWrap.appendChild(btn);

    card.appendChild(left);
    card.appendChild(pinWrap);
    c.appendChild(card);
  });
}

/* ── クリップサイドバー ── */
function renderClips() {
  const clips  = loadClips();
  const ul     = document.getElementById('clip-list');
  const sorted = Object.entries(clips).sort((a, b) => (b[1].clippedAt||0) - (a[1].clippedAt||0));
  document.getElementById('clip-count').textContent = sorted.length ? sorted.length + '件' : '';
  if (!sorted.length) { ul.innerHTML = '<li class="clip-empty">クリップされた記事はありません</li>'; return; }
  ul.innerHTML = '';
  sorted.forEach(([id, clip]) => {
    const li   = document.createElement('li'); li.className = 'clip-item';
    const body = document.createElement('div'); body.className = 'clip-body';
    const tt   = document.createElement('div'); tt.className = 'clip-title-text'; tt.textContent = clip.title || '';
    const mm   = document.createElement('div'); mm.className = 'clip-meta';
    if (clip.keyword) { const k = document.createElement('span'); k.className = 'clip-kw'; k.textContent = clip.keyword; mm.appendChild(k); }
    body.appendChild(tt); body.appendChild(mm);
    li.appendChild(document.createTextNode('📌 ')); li.appendChild(body);
    // クリップ一覧からもパネルを開く
    li.addEventListener('click', () => {
      const found = allAlerts.find(a => a.id === id);
      if (found) openPanel(found);
      else openPanelFromClip(id, clip);
    });
    ul.appendChild(li);
  });
}

function togglePin(alert, btn) {
  const clips  = loadClips();
  const pinned = !!clips[alert.id];
  if (pinned) { delete clips[alert.id]; } 
  else { clips[alert.id] = { title: alert.title||'', url: alert.url||'', keyword: alert.keyword||'', date: alert.date||'', clippedAt: Date.now() }; }
  saveClips(clips);
  btn.classList.toggle('pinned', !pinned);
  btn.querySelector('.pin-icon').textContent = pinned ? '📍' : '📌';
  btn.querySelector('.pin-label').textContent = pinned ? 'クリップ' : '済';
  // パネルのピンボタンも同期
  if (currentAlert?.id === alert.id) updatePanelPin(alert.id);
  renderClips();
}

/* ── スライドインパネル ── */
function openPanel(alert) {
  currentAlert = alert;
  document.getElementById('layout').classList.add('panel-open');
  document.getElementById('slide-panel').classList.add('open');
  // アクティブカードのハイライト
  document.querySelectorAll('.alert-card').forEach(c => c.classList.toggle('active', c.dataset.id === alert.id));

  const clips   = loadClips();
  const pinned  = !!clips[alert.id];
  const pinBtn  = document.getElementById('sp-pin-btn');
  pinBtn.textContent = pinned ? '📌 クリップ済' : '📍 クリップ';
  pinBtn.className   = 'sp-pin-btn' + (pinned ? ' pinned' : '');
  pinBtn.onclick = () => { togglePinFromPanel(alert); };

  const linkBtn = document.getElementById('sp-link-btn');
  linkBtn.href  = alert.url || '#';

  renderPanelBody(alert);
}

function openPanelFromClip(id, clip) {
  // allAlertsにない場合（古いクリップ）でもパネルを開く
  openPanel({ id, ...clip });
}

function renderPanelBody(alert) {
  const summaries = loadSummaries();
  const cached    = summaries[alert.id];
  const body      = document.getElementById('sp-body');
  body.innerHTML  = '';

  const topLine = document.createElement('div');
  if (alert.keyword) { const t = document.createElement('span'); t.className = 'sp-kw-tag'; t.textContent = alert.keyword; topLine.appendChild(t); }
  if (alert.date)    { const d = document.createElement('span'); d.className = 'sp-date'; d.textContent = alert.date; topLine.appendChild(d); }
  body.appendChild(topLine);

  const titleEl = document.createElement('div'); titleEl.className = 'sp-title'; titleEl.textContent = alert.title || '';
  body.appendChild(titleEl);

  if (alert.source) { const src = document.createElement('div'); src.className = 'sp-source'; src.textContent = alert.source; body.appendChild(src); }

  const hr = document.createElement('hr'); hr.className = 'sp-divider'; body.appendChild(hr);

  const box = document.createElement('div'); box.className = 'sp-summary-box';

  const label = document.createElement('div'); label.className = 'sp-summary-label';
  label.innerHTML = '✨ AI要約';
  box.appendChild(label);

  const textEl = document.createElement('div'); textEl.className = 'sp-summary-text';

  if (cached) {
    textEl.textContent = cached;
    box.appendChild(textEl);
  } else {
    textEl.className += ' loading'; textEl.textContent = 'まだ要約されていません。';
    box.appendChild(textEl);
    const sumBtn = document.createElement('button'); sumBtn.className = 'sp-summarize-btn'; sumBtn.textContent = '🤖 この記事を要約する';
    sumBtn.addEventListener('click', () => summarize(alert, textEl, sumBtn));
    box.appendChild(sumBtn);
  }
  body.appendChild(box);
}

function updatePanelPin(id) {
  const clips  = loadClips();
  const pinned = !!clips[id];
  const pinBtn = document.getElementById('sp-pin-btn');
  pinBtn.textContent = pinned ? '📌 クリップ済' : '📍 クリップ';
  pinBtn.className   = 'sp-pin-btn' + (pinned ? ' pinned' : '');
}

function togglePinFromPanel(alert) {
  // カード一覧のボタンを探して同期
  const cardBtn = document.querySelector(`.alert-card[data-id="${alert.id}"] .pin-btn`);
  if (cardBtn) { togglePin(alert, cardBtn); }
  else {
    // カードが表示されていない場合（クリップ経由など）
    const clips  = loadClips();
    const pinned = !!clips[alert.id];
    if (pinned) { delete clips[alert.id]; } 
    else { clips[alert.id] = { title: alert.title||'', url: alert.url||'', keyword: alert.keyword||'', date: alert.date||'', clippedAt: Date.now() }; }
    saveClips(clips);
    updatePanelPin(alert.id);
    renderClips();
  }
}

/* ── AI要約 ── */
async function summarize(alert, textEl, btn) {
  btn.disabled = true; btn.textContent = '⏳ 要約中...';
  textEl.className = 'sp-summary-text loading';

  let articleText = alert.snippet || '';

  // まずURLから本文取得を試みる
  try {
    const proxyUrl = 'https://api.allorigins.win/get?url=' + encodeURIComponent(alert.url);
    const res = await fetch(proxyUrl);
    const json = await res.json();
    // タグを除去してテキスト抽出
    const tmp = document.createElement('div');
    tmp.innerHTML = json.contents || '';
    const extracted = tmp.innerText || tmp.textContent || '';
    if (extracted.length > 200) articleText = extracted.slice(0, 3000);
  } catch(e) { /* 取得失敗はsnippetで続行 */ }

  const prompt = articleText.length > 100
    ? `以下の記事を日本語で3〜5箇条書きで簡潔に要約してください。\n\n記事タイトル：${alert.title}\n\n本文：\n${articleText}`
    : `以下の記事タイトルと断片から、内容を日本語で2〜3文で推測・要約してください。\n\nタイトル：${alert.title}\n断片：${articleText}`;

  try {
    const res  = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '要約できませんでした。';
    textEl.className  = 'sp-summary-text';
    textEl.textContent = text;
    // キャッシュ保存
    const summaries = loadSummaries();
    summaries[alert.id] = text;
    saveSummaries(summaries);
    btn.remove();
  } catch(e) {
    textEl.className  = 'sp-summary-text';
    textEl.textContent = '要約に失敗しました。時間をおいて再度お試しください。';
    btn.disabled = false; btn.textContent = '🤖 再試行';
  }
}

/* ── パネル閉じる ── */
document.getElementById('sp-close').addEventListener('click', () => {
  document.getElementById('slide-panel').classList.remove('open');
  document.getElementById('layout').classList.remove('panel-open');
  document.querySelectorAll('.alert-card').forEach(c => c.classList.remove('active'));
  currentAlert = null;
});

document.getElementById('search-input').addEventListener('input', e => { searchQuery = e.target.value; renderAlerts(); });

loadAlerts();
